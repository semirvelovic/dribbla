quarkus.grpc.server.host=0.0.0.0
quarkus.grpc.server.port=9000

quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:dribbla}
quarkus.datasource.password=${DB_PASSWORD:dribbla}
quarkus.datasource.jdbc.url=${DB_JDBC_URL:jdbc:postgresql://postgres:5432/dribbla}

quarkus.hibernate-orm.schema-management.strategy=none
quarkus.flyway.migrate-at-start=true
quarkus.flyway.validate-migration-naming=true
