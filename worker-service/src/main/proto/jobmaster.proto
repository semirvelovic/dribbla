syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.dribbla.grpc";
option java_outer_classname = "dribblaProto";

package dribbla;

service JobService {
  rpc SubmitJob(SubmitJobRequest) returns (JobResponse);
  rpc GetJob(GetJobRequest) returns (JobResponse);
  rpc ListJobs(ListJobsRequest) returns (ListJobsResponse);
  rpc ClaimJob(ClaimJobRequest) returns (JobResponse);
  rpc UpdateJobStatus(JobStatusRequest) returns (JobStatusResponse);
}

message SubmitJobRequest {
  string name = 1;
  string payload_json = 2;
}

message GetJobRequest {
  string job_id = 1;
}

message ListJobsRequest {
  string status = 1;
}

message JobResponse {
  string id = 1;
  string name = 2;
  string payload_json = 3;
  string status = 4;
  string created_at = 5;
  string updated_at = 6;
  string worker_id = 7;
  string started_at = 8;
  string finished_at = 9;
  string error_message = 10;
}

message ListJobsResponse {
  repeated JobResponse jobs = 1;
}

message ClaimJobRequest {
  string worker_id = 1;
}

message JobStatusRequest {
  string job_id = 1;
  string status = 2;
}

message JobStatusResponse {
  string status = 1;
}

